<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đồng Hồ Phục Hồi - Trợ Lý Cột Sống</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg-body: #f8fafc; --bg-card: #ffffff;
            --blue-light: #eff6ff; --blue-primary: #2563eb; 
            --blue-dark: #1e3a8a; --green-primary: #10b981; 
            --orange-primary: #f59e0b; --orange-light: #fef3c7;
            --text-main: #334155; --text-muted: #64748b;
            --border-color: #e2e8f0;
        }

        body.dark-mode {
            --bg-body: #0f172a; --bg-card: #1e293b;
            --blue-light: #1e293b; --blue-primary: #38bdf8; 
            --blue-dark: #bae6fd; --green-primary: #10b981; 
            --orange-primary: #fbbf24; --orange-light: #334155;
            --text-main: #f1f5f9; --text-muted: #94a3b8;
            --border-color: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* CẬP NHẬT FONT MONTSERRAT */
        body { 
            font-family: 'Montserrat', sans-serif; 
            color: var(--text-main); background-color: var(--bg-body); 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; transition: background-color 0.3s ease, color 0.3s ease;
            padding-bottom: 50px;
            font-size: 17px;
            line-height: 1.7;
        }

        button, input, select, textarea {
            font-family: inherit; 
        }

        header { width: 100%; padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;}
        .btn-back { text-decoration: none; color: var(--blue-dark); font-weight: bold; font-size: 16px; display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: 8px; background-color: var(--bg-card); box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid var(--border-color); transition: 0.3s; }
        .btn-back:hover { background-color: var(--blue-light); transform: translateX(-5px); }
        
        .header-tools { display: flex; gap: 10px; align-items: center; }
        .daily-streak { background-color: var(--bg-card); color: var(--orange-primary); font-weight: bold; padding: 10px 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid var(--orange-light); display: flex; align-items: center; gap: 5px; font-size: 15px;}
        
        .btn-icon-tool { background-color: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-main); font-weight: bold; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-size: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: 0.3s; width: 45px; text-align: center;}
        .btn-icon-tool:hover { background-color: var(--border-color); }
        
        .volume-wrapper { position: relative; display: inline-block; }
        .volume-popup { position: absolute; top: 120%; right: 0; background: var(--bg-card); padding: 12px 15px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid var(--border-color); opacity: 0; visibility: hidden; transition: 0.3s; z-index: 10; display: flex; align-items: center; gap: 10px;}
        .volume-wrapper:hover .volume-popup { opacity: 1; visibility: visible; transform: translateY(-5px); }
        
        input[type=range] { -webkit-appearance: none; width: 100px; background: transparent; cursor: pointer;}
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: var(--blue-primary); margin-top: -6px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); transition: 0.2s;}
        input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: var(--border-color); border-radius: 2px; }
        input[type=range]:focus { outline: none; }

        .config-container { display: flex; gap: 20px; margin-top: 10px; flex-wrap: wrap; justify-content: center; background-color: var(--bg-card); padding: 15px 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid var(--border-color); transition: 0.3s ease; }
        .config-item { display: flex; align-items: center; gap: 10px; }
        .config-item label { font-weight: bold; color: var(--blue-dark); font-size: 16px; }
        .config-item select, .config-item input { padding: 8px 15px; font-size: 16px; border-radius: 10px; border: 2px solid var(--blue-primary); color: var(--text-main); font-weight: bold; outline: none; cursor: pointer; background-color: var(--bg-body); }
        .config-item input { width: 90px; text-align: center; }

        /* UI CHO TOOLTIP KHUYẾN NGHỊ THỜI GIAN */
        .tooltip-wrapper { position: relative; }
        .custom-tooltip {
            position: absolute;
            bottom: 120%;
            left: 50%;
            transform: translateX(-35%);
            background: var(--blue-dark);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
            align-items: center;
            gap: 12px;
            white-space: nowrap;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 100;
            animation: fadeIn 0.3s ease;
        }
        .custom-tooltip::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 35%;
            margin-left: -5px;
            border-width: 6px;
            border-style: solid;
            border-color: var(--blue-dark) transparent transparent transparent;
        }
        .custom-tooltip.show { display: flex; }
        .tooltip-close {
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.7);
            font-size: 18px;
            cursor: pointer;
            padding: 0;
            line-height: 1;
            font-weight: bold;
            box-shadow: none;
            transition: 0.2s;
            min-width: auto;
        }
        .tooltip-close:hover { color: var(--orange-primary); transform: scale(1.2); }

        #addTimeContainer { display: none; border-left: 2px dashed var(--border-color); padding-left: 20px; }
        #addTimeContainer input { width: 70px; border-color: var(--orange-primary); color: var(--orange-primary); }
        .btn-quick-add { background-color: var(--orange-primary); color: white; border: none; padding: 9px 15px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); transition: 0.2s; margin-left: -5px; }
        .btn-quick-add:hover { background-color: #d97706; transform: scale(1.05); }

        .timer-container { text-align: center; margin-top: 30px; }
        .session-title { font-size: 28px; color: var(--blue-dark); margin-bottom: 10px; font-weight: bold; transition: 0.5s; }
        .exercise-subtitle { font-size: 18px; color: var(--orange-primary); margin-bottom: 15px; font-weight: 600; height: 25px;}
        
        .progress-ring { position: relative; width: 300px; height: 300px; margin: 0 auto; }
        .progress-ring svg { transform: rotate(-90deg); width: 100%; height: 100%; }
        .progress-ring circle { fill: transparent; stroke-width: 15; stroke-linecap: round; }
        .progress-ring .bg-circle { stroke: var(--border-color); }
        .progress-ring .progress-circle { stroke: var(--blue-primary); stroke-dasharray: 880; stroke-dashoffset: 0; transition: stroke-dashoffset 1s linear, stroke 0.5s ease; }
        .time-display { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 64px; font-weight: bold; color: var(--text-main); transition: 0.5s; }

        .controls { margin-top: 30px; display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
        button { padding: 12px 25px; font-size: 16px; font-weight: bold; border: none; border-radius: 50px; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn-start { background-color: var(--blue-primary); color: white; min-width: 130px;}
        .btn-start:hover { filter: brightness(1.1); transform: translateY(-2px); }
        .btn-view-detail { background-color: var(--orange-light); color: var(--orange-primary); border: 2px solid var(--orange-primary); display: none; }
        .btn-view-detail:hover { background-color: var(--orange-primary); color: white; }
        .btn-reset { background-color: var(--bg-card); color: var(--text-muted); border: 1px solid var(--border-color); }
        .btn-reset:hover { background-color: var(--bg-body); }

        .selection-panel { width: 90%; max-width: 600px; background-color: var(--bg-card); border-radius: 20px; padding: 30px; margin-top: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.08); border-top: 6px solid var(--orange-primary); border: 1px solid var(--border-color); display: none; animation: slideUp 0.5s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .panel-header { text-align: center; margin-bottom: 20px; }
        .panel-header h3 { color: var(--orange-primary); font-size: 22px; margin-bottom: 5px; text-transform: uppercase;}
        .panel-header p { color: var(--text-muted); font-size: 16px; font-weight: 600; }

        .exercise-options { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px;}
        .exercise-option-btn { background-color: var(--orange-light); border: 2px solid transparent; border-left: 6px solid var(--orange-primary); border-radius: 12px; padding: 15px 20px; text-align: left; cursor: pointer; transition: 0.3s; display: flex; justify-content: space-between; align-items: center; }
        .exercise-option-btn:hover { border-color: var(--orange-primary); transform: translateX(5px); }
        .opt-name { font-size: 16px; font-weight: bold; color: var(--text-main); flex: 1;}
        .opt-time { background-color: var(--bg-card); color: var(--orange-primary); padding: 5px 10px; border-radius: 8px; font-size: 14px; font-weight: bold; white-space: nowrap; margin-left: 10px;}

        .btn-snooze { width: 100%; background-color: var(--bg-body); color: var(--text-muted); padding: 15px; font-size: 16px; border-radius: 12px; border: 1px dashed var(--border-color); transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px;}
        .btn-snooze:hover { border-style: solid; color: var(--text-main);}

        .btn-back-to-work { background-color: var(--green-primary); color: white; margin-top: 20px; width: 100%; display: none; padding: 15px; font-size: 20px; border-radius: 12px;}
        .btn-back-to-work:hover { filter: brightness(1.1); transform: scale(1.02); }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.7); backdrop-filter: blur(3px); display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: 0.3s ease; z-index: 2000; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-content { background-color: var(--bg-card); width: 90%; max-width: 600px; max-height: 85vh; overflow-y: auto; border-radius: 15px; padding: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); transform: scale(0.9); transition: 0.3s ease; border-top: 6px solid var(--orange-primary); border: 1px solid var(--border-color);}
        .modal-overlay.active .modal-content { transform: scale(1); }
        .detail-title { color: var(--orange-primary); font-size: 24px; margin-bottom: 20px; text-align: center; line-height: 1.4;}
        .instruction-steps { list-style: none; margin-bottom: 30px; }
        .instruction-steps li { position: relative; padding-left: 25px; margin-bottom: 12px; font-size: 16px; line-height: 1.6; color: var(--text-main);}
        .instruction-steps li::before { content: "✓"; position: absolute; left: 0; color: var(--orange-primary); font-weight: bold;}
        .btn-close { width: 100%; background-color: var(--bg-body); color: var(--text-main); padding: 12px; font-size: 16px; border-radius: 10px; border: 1px solid var(--border-color); font-weight: bold; cursor: pointer; transition: 0.3s;}
        .btn-close:hover { filter: brightness(0.9); }

        #toast {
            visibility: hidden; min-width: 250px; background-color: var(--blue-dark); color: #fff;
            text-align: center; border-radius: 8px; padding: 16px 20px; position: fixed;
            z-index: 3000; left: 50%; bottom: 30px; transform: translateX(-50%);
            font-size: 15px; box-shadow: 0px 10px 30px rgba(0,0,0,0.3); font-weight: 500;
        }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 3.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }

        body.exercise-mode { background-color: var(--orange-light); }
        body.exercise-mode.dark-mode { background-color: #451a03; }
        body.exercise-mode .session-title, body.exercise-mode .time-display { color: var(--orange-primary); }
        body.exercise-mode .progress-circle { stroke: var(--orange-primary); }
        body.exercise-mode .btn-start { background-color: var(--orange-primary); }
        body.exercise-mode .btn-start:hover { filter: brightness(1.1); }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="btn-back"><span>&#8592;</span> Trang chủ</a>
        <div class="header-tools">
            <div class="daily-streak" id="dailyStreakCount">🔥 Hôm nay: 0 bài</div>
            <button class="btn-icon-tool" id="darkModeToggle" onclick="toggleDarkMode()" title="Chế độ Sáng/Tối">🌙</button>

            <div class="volume-wrapper">
                <button class="btn-icon-tool" id="btnMute" onclick="toggleMute()" title="Bật/Tắt âm thanh">🔊</button>
                <div class="volume-popup">
                    <span style="font-size: 14px; color: var(--text-muted);">Âm lượng:</span>
                    <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="1" oninput="changeVolume()">
                </div>
            </div>
        </div>
    </header>

    <div class="config-container">
        <div class="config-item">
            <label>Lộ trình:</label>
            <select id="weekSelect" onchange="saveWeek()">
                <option value="1">Tuần 1: Khởi động</option>
                <option value="2">Tuần 2: Giảm cơn đau</option>
                <option value="3">Tuần 3: Tăng sức mạnh</option>
                <option value="4">Tuần 4: Duy trì và ổn định</option>
            </select>
        </div>
        <div class="config-item tooltip-wrapper">
            <label>Làm việc (phút):</label>
            <input type="number" id="workMinInput" min="1" max="180" value="90" onchange="updateWorkTime()" onclick="showWorkTimeTooltip()">
            
            <div id="workTimeTooltip" class="custom-tooltip">
                <span>💡 Thời gian khuyến nghị là 90 phút</span>
                <button type="button" class="tooltip-close" onclick="closeWorkTimeTooltip(event)">×</button>
            </div>
        </div>
        
        <div class="config-item" id="addTimeContainer">
            <label style="color: var(--orange-primary);">Gia hạn:</label>
            <button class="btn-quick-add" onclick="addExerciseTime(10)">+10s</button>
            <input type="number" id="customAddSecInput" value="30" min="1" placeholder="Giây">
            <button class="btn-quick-add" onclick="addCustomExerciseTime()">+ Thêm</button>
        </div>
    </div>

    <div class="timer-container">
        <div class="session-title" id="sessionTitle">PHIÊN LÀM VIỆC</div>
        <div class="exercise-subtitle" id="exerciseSubtitle"></div>
        <div class="progress-ring">
            <svg>
                <circle class="bg-circle" cx="150" cy="150" r="140"></circle>
                <circle class="progress-circle" id="progressCircle" cx="150" cy="150" r="140"></circle>
            </svg>
            <div class="time-display" id="timeDisplay">90:00</div>
        </div>
        
        <div class="controls" id="mainControls">
            <button class="btn-start" id="startBtn" onclick="toggleTimer()">Bắt Đầu</button>
            <button class="btn-view-detail" id="btnViewDetail" onclick="openDetailModal()">📖 Xem hướng dẫn</button>
            <button class="btn-reset" onclick="resetTimer()">Làm mới</button>
        </div>
        
        <button class="btn-back-to-work" id="btnBackToWork" onclick="returnToWork()">Tuyệt vời! Quay lại Làm việc</button>
    </div>

    <div class="selection-panel" id="selectionPanel">
        <div class="panel-header">
            <h3>🔥 ĐẾN GIỜ VẬN ĐỘNG</h3>
            <p id="timeSlotContext">Chọn 1 bài tập bạn muốn thực hiện ngay lúc này:</p>
        </div>
        <div class="exercise-options" id="exerciseOptionsContainer"></div>
        <button class="btn-snooze" onclick="snoozeTimer()">💻 Đang bận họp - Nhắc lại sau 10 phút</button>
    </div>

    <div class="modal-overlay" id="detailModal">
        <div class="modal-content">
            <h3 class="detail-title" id="detailTitle">Tên bài tập</h3>
            <ul class="instruction-steps" id="detailSteps"></ul>
            <button class="btn-close" onclick="closeDetailModal()">Đã hiểu - Đóng lại</button>
        </div>
    </div>

    <div id="toast">Thông báo</div>

    <audio id="alarmSound" src="https://assets.mixkit.co/active_storage/sfx/2820/2820-preview.mp3" preload="auto"></audio>

    <script>
        // LOGIC DARK MODE
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('pt_dark_mode', isDark ? 'enabled' : 'disabled');
            document.getElementById('darkModeToggle').innerText = isDark ? '☀️' : '🌙';
        }

        // TOOLTIP LOGIC
        function showWorkTimeTooltip() {
            document.getElementById('workTimeTooltip').classList.add('show');
        }

        function closeWorkTimeTooltip(event) {
            event.stopPropagation(); // Ngăn sự kiện click truyền ra ngoài
            document.getElementById('workTimeTooltip').classList.remove('show');
        }

        document.addEventListener('click', function(event) {
            var input = document.getElementById('workMinInput');
            var tooltip = document.getElementById('workTimeTooltip');
            if (!input.contains(event.target) && !tooltip.contains(event.target)) {
                tooltip.classList.remove('show');
            }
        });

        // ====================================================================
        // 1. HÀM XIN QUYỀN THÔNG BÁO (Gọi khi người dùng bấm nút Bắt Đầu)
        // ====================================================================
        function requestNotificationPermission() {
            if (!("Notification" in window)) {
                return;
            }
            if (Notification.permission !== "granted" && Notification.permission !== "denied") {
                Notification.requestPermission();
            }
        }

        // ====================================================================
        // 2. HÀM BẮN THÔNG BÁO TRỰC TIẾP VÀO WINDOWS ACTION CENTER
        // ====================================================================
        function pushOSNotification(title, bodyText) {
            // Kiểm tra xem trình duyệt có hỗ trợ không
            if (!("Notification" in window)) {
                return;
            }

            // Kiểm tra xem đã có quyền chưa
            if (Notification.permission === "granted") {
                try {
                    const notification = new Notification(title, {
                        body: bodyText,
                        icon: "https://cdn-icons-png.flaticon.com/512/3048/3048122.png", // Icon cái đồng hồ
                        requireInteraction: true // Lệnh này cực kỳ quan trọng: Ép thông báo lưu lại trong Action Center cho đến khi người dùng tự tắt
                    });

                    // Khi người dùng click vào cái thông báo ở góc màn hình, tự động mở lại tab web
                    notification.onclick = function() {
                        window.focus(); 
                        this.close();
                    };
                } catch (error) {
                    // Xử lý dự phòng nếu một số trình duyệt từ chối requireInteraction
                    new Notification(title, { body: bodyText, icon: "https://cdn-icons-png.flaticon.com/512/3048/3048122.png" });
                }
            } 
            // Nếu bị chặn quyền thì web sẽ im lặng không làm gì cả, không hiện popup nữa
        }

        // CƠ SỞ DỮ LIỆU ĐÃ ĐƯỢC CHUẨN HÓA THỜI GIAN THEO KẾ HOẠCH
        const exerciseDB = {
            "1": { 
                "246": { 
                    "sang": [{ name: "Hít thở", duration: 60, details: ["Hít sâu vào bằng mũi thở ra chậm bằng miệng (thở ra gấp 2 - 3 lần hít vào)."] }, { name: "Đứng lên và di chuyển", duration: 60, details: ["Đứng lên và di chuyển (đứng - ngồi tại chỗ, đi uống nước, ăn nhẹ, vệ sinh,...). Tối thiểu 1 phút."] }, { name: "Hít thở & gập duỗi cổ", duration: 150, details: ["Hít thở kết hợp gập duỗi cổ nhẹ nhàng. (5 lần x 3 hiệp, mỗi hiệp nghỉ 30s)."] }], 
                    "chieu": [{ name: "Đứng lên và di chuyển", duration: 60, details: ["Đứng lên và di chuyển (đứng - ngồi tại chỗ, đi uống nước, ăn nhẹ, vệ sinh,...). Tối thiểu 1 phút."] }, { name: "Gập thân & Ưỡn người", duration: 150, details: ["Gập thân mình tới trước / ưỡn người về phía sau. (5 lần x 3 hiệp, mỗi hiệp nghỉ 30s)."] }], 
                    "toi": [{ name: "Xoay cổ", duration: 300, details: ["Xoay cổ sang trái / phải giữ lại 30s lặp lại 5 lần mỗi bên."] }, { name: "Nghiêng đầu", duration: 300, details: ["Nghiêng đầu sang trái / phải giữ lại 30s lặp lại 5 lần mỗi bên."] }] 
                },

        let WORK_TIME = 90 * 60; 
        let timeRemaining = WORK_TIME;
        let currentMode = 'WORK'; 
        let currentTotalTime = WORK_TIME; 
        let currentExerciseDuration = 0; 
        let currentExerciseList = [];
        let currentTaskObj = null;

        let timerInterval = null;
        let isRunning = false;
        let dailyCount = 0;
        let currentVolume = 1; 
        let isMuted = false;
        let targetEndTime = null;

        const timeDisplay = document.getElementById('timeDisplay');
        const sessionTitle = document.getElementById('sessionTitle');
        const exerciseSubtitle = document.getElementById('exerciseSubtitle');
        const startBtn = document.getElementById('startBtn');
        const btnViewDetail = document.getElementById('btnViewDetail');
        const progressCircle = document.getElementById('progressCircle');
        const selectionPanel = document.getElementById('selectionPanel');
        const mainControls = document.getElementById('mainControls');
        const btnBackToWork = document.getElementById('btnBackToWork');
        const workMinInput = document.getElementById('workMinInput');
        const addTimeContainer = document.getElementById('addTimeContainer');
        const alarmSound = document.getElementById('alarmSound');
        const volumeSlider = document.getElementById('volumeSlider');
        const circleCircumference = 2 * Math.PI * 140;

        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 4000);
        }

        function changeVolume() {
            currentVolume = parseFloat(volumeSlider.value);
            alarmSound.volume = currentVolume;
            localStorage.setItem('pt_volume', currentVolume);
            
            if (currentVolume === 0) {
                isMuted = true;
                document.getElementById('btnMute').innerText = "🔇";
            } else {
                isMuted = false;
                document.getElementById('btnMute').innerText = currentVolume < 0.5 ? "🔉" : "🔊";
            }
        }

        function toggleMute() {
            if (isMuted) {
                isMuted = false;
                currentVolume = parseFloat(localStorage.getItem('pt_volume')) || 1;
                if(currentVolume === 0) currentVolume = 0.5; 
                volumeSlider.value = currentVolume;
                alarmSound.volume = currentVolume;
                document.getElementById('btnMute').innerText = currentVolume < 0.5 ? "🔉" : "🔊";
                showToast(`Âm lượng: ${Math.round(currentVolume * 100)}%`);
            } else {
                isMuted = true;
                alarmSound.volume = 0;
                volumeSlider.value = 0;
                document.getElementById('btnMute').innerText = "🔇";
                showToast("Đã tắt âm thanh nhắc nhở 🔇");
            }
        }

        function playSound() {
            if (!isMuted && currentVolume > 0) {
                alarmSound.currentTime = 0;
                alarmSound.play();
            }
        }

        function updateDailyStreak() {
            const today = new Date().toDateString();
            const savedDate = localStorage.getItem('pt_streak_date');
            if (savedDate !== today) { dailyCount = 0; localStorage.setItem('pt_streak_date', today); } 
            else { dailyCount = parseInt(localStorage.getItem('pt_daily_count') || 0); }
            document.getElementById('dailyStreakCount').innerText = `🔥 Hôm nay: ${dailyCount} bài`;
        }

        function increaseStreak() {
            dailyCount++;
            localStorage.setItem('pt_daily_count', dailyCount);
            document.getElementById('dailyStreakCount').innerText = `🔥 Hôm nay: ${dailyCount} bài`;
        }

        function updateUI() {
            let minutes = Math.floor(timeRemaining / 60); let seconds = timeRemaining % 60;
            let timeString = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            timeDisplay.innerText = timeString;
            
            let tabStatus = (currentMode === 'WORK') ? "Phiên làm việc" : (currentMode === 'SELECT') ? "Đến giờ tập!" : "Đang tập";
            document.title = `(${timeString}) ${tabStatus} - Trợ Lý Cột Sống`;

            let percentLeft = timeRemaining / currentTotalTime;
            let offset = circleCircumference - (percentLeft * circleCircumference);
            progressCircle.style.strokeDashoffset = offset;

            if (currentMode === 'WORK') {
                document.body.classList.remove('exercise-mode'); sessionTitle.innerText = "PHIÊN LÀM VIỆC"; exerciseSubtitle.innerText = "";
                selectionPanel.style.display = 'none'; mainControls.style.display = 'flex';
                btnBackToWork.style.display = 'none'; btnViewDetail.style.display = 'none'; addTimeContainer.style.display = 'none'; 
            } 
            else if (currentMode === 'SELECT') {
                document.body.classList.add('exercise-mode'); sessionTitle.innerText = "ĐẾN GIỜ VẬN ĐỘNG"; exerciseSubtitle.innerText = "";
                timeDisplay.innerText = "00:00"; progressCircle.style.strokeDashoffset = circleCircumference;
                selectionPanel.style.display = 'block'; mainControls.style.display = 'none';
                btnBackToWork.style.display = 'none'; btnViewDetail.style.display = 'none'; addTimeContainer.style.display = 'none'; 
                loadExercisesForCurrentSlot();
            }
            else if (currentMode === 'EXERCISE') {
                document.body.classList.add('exercise-mode'); sessionTitle.innerText = "ĐANG TẬP LUYỆN";
                selectionPanel.style.display = 'none'; mainControls.style.display = 'flex';
                btnBackToWork.style.display = 'none'; btnViewDetail.style.display = 'inline-block'; addTimeContainer.style.display = 'flex'; 
            }
        }

        function loadExercisesForCurrentSlot() {
            const currentWeek = document.getElementById('weekSelect').value; const now = new Date();
            let dayGroup = (now.getDay() === 1 || now.getDay() === 3 || now.getDay() === 5) ? "246" : "357";
            let timeSlot = (now.getHours() < 12) ? "sang" : (now.getHours() < 18) ? "chieu" : "toi";

            currentExerciseList = exerciseDB[currentWeek][dayGroup][timeSlot];
            const container = document.getElementById('exerciseOptionsContainer'); container.innerHTML = "";
            currentExerciseList.forEach((task, index) => {
                let div = document.createElement("div"); div.className = "exercise-option-btn";
                div.innerHTML = `<span class="opt-name">${task.name}</span><span class="opt-time">${task.duration}s</span>`;
                div.onclick = () => selectExercise(index); container.appendChild(div);
            });
        }

        function selectExercise(index) {
            currentTaskObj = currentExerciseList[index]; currentExerciseDuration = currentTaskObj.duration;
            currentTotalTime = currentExerciseDuration; timeRemaining = currentExerciseDuration; currentMode = 'EXERCISE';
            
            localStorage.setItem('pt_timer_mode', 'EXERCISE');
            localStorage.setItem('pt_total_time', currentTotalTime);
            
            exerciseSubtitle.innerText = `Đang chọn: ${currentTaskObj.name}`; startBtn.innerText = "Bắt đầu tập";
            updateUI(); openDetailModal(); 
        }

        function openDetailModal() {
            if(!currentTaskObj) return; document.getElementById('detailTitle').innerText = currentTaskObj.name;
            const ul = document.getElementById('detailSteps'); ul.innerHTML = "";
            currentTaskObj.details.forEach(step => { let li = document.createElement("li"); li.innerText = step; ul.appendChild(li); });
            document.getElementById('detailModal').classList.add('active');
        }
        function closeDetailModal() { document.getElementById('detailModal').classList.remove('active'); }

        function updateWorkTime() {
            let newVal = parseInt(workMinInput.value);
            if (newVal > 0) {
                WORK_TIME = newVal * 60; localStorage.setItem('pt_custom_work', WORK_TIME);
                if (currentMode === 'WORK') resetTimer(); showToast(`Đã đổi thời gian làm việc thành ${newVal} phút.`);
            } else { alert("Vui lòng nhập số phút hợp lệ (>0)!"); workMinInput.value = WORK_TIME / 60; }
        }

        function saveWeek() { localStorage.setItem('pt_current_week', document.getElementById('weekSelect').value); }

        function startInterval() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (!targetEndTime) return;
                
                timeRemaining = Math.ceil((targetEndTime - Date.now()) / 1000);
                
                if (timeRemaining <= 0) {
                    timeRemaining = 0;
                    clearInterval(timerInterval);
                    isRunning = false;
                    localStorage.setItem('pt_timer_state', 'STOPPED');
                    handleTimerComplete();
                } else {
                    updateUI();
                }
            }, 1000);
        }

        function toggleTimer() {
            requestNotificationPermission(); 
            
            if (isRunning) {
                clearInterval(timerInterval); 
                isRunning = false;
                startBtn.innerText = "Tiếp tục"; 
                localStorage.setItem('pt_timer_state', 'PAUSED');
                localStorage.setItem('pt_timer_time', timeRemaining);
                targetEndTime = null;
                localStorage.removeItem('pt_end_time');
            } else {
                isRunning = true;
                startBtn.innerText = "Tạm dừng"; 
                
                targetEndTime = Date.now() + (timeRemaining * 1000);
                localStorage.setItem('pt_end_time', targetEndTime);
                localStorage.setItem('pt_timer_state', 'RUNNING');
                localStorage.setItem('pt_timer_mode', currentMode);
                localStorage.setItem('pt_total_time', currentTotalTime);
                
                startInterval();
            }
        }

        function handleTimerComplete() {
            playSound(); 
            if (currentMode === 'WORK') {
                currentMode = 'SELECT'; 
                pushOSNotification("⏰ Cột sống đang kêu cứu!", "Đã hết thời gian ngồi tĩnh. Mở web lên và chọn bài tập giải phóng cột sống nhé!"); 
                updateUI();
            } else if (currentMode === 'EXERCISE') {
                increaseStreak(); 
                pushOSNotification("🎉 Tuyệt vời!", "Bạn đã hoàn thành bài tập. Tiếp tục giữ phong độ và làm việc hiệu quả nhé!");
                exerciseSubtitle.innerText = "Tuyệt vời! Bạn đã hoàn thành bài tập.";
                mainControls.style.display = 'none'; btnBackToWork.style.display = 'block'; addTimeContainer.style.display = 'none';
            }
        }

        function snoozeTimer() {
            currentMode = 'WORK'; currentTotalTime = WORK_TIME; timeRemaining = 10 * 60; 
            localStorage.setItem('pt_timer_mode', 'WORK');
            localStorage.setItem('pt_total_time', currentTotalTime);
            showToast("Đã lùi 10 phút. Cột sống đang khóc đấy, ráng xong việc rồi tập nha! 🥲");
            
            if(isRunning) {
                targetEndTime = Date.now() + (timeRemaining * 1000);
                localStorage.setItem('pt_end_time', targetEndTime);
            } else {
                localStorage.setItem('pt_timer_time', timeRemaining);
                toggleTimer();
            }
            updateUI();
        }

        function addExerciseTime(seconds) {
            if (currentMode !== 'EXERCISE') return;
            timeRemaining += seconds; currentTotalTime += seconds;
            
            if(isRunning) {
                targetEndTime += (seconds * 1000);
                localStorage.setItem('pt_end_time', targetEndTime);
            } else {
                localStorage.setItem('pt_timer_time', timeRemaining);
            }
            
            localStorage.setItem('pt_total_time', currentTotalTime);
            updateUI(); showToast(`Đã cộng thêm ${seconds} giây. Cố lên! 💪`);
        }

        function returnToWork() {
            currentMode = 'WORK'; currentTotalTime = WORK_TIME; timeRemaining = WORK_TIME;
            startBtn.innerText = "Bắt Đầu"; 
            localStorage.setItem('pt_timer_mode', 'WORK');
            localStorage.setItem('pt_total_time', currentTotalTime);
            updateUI(); toggleTimer(); 
        }

        function resetTimer() {
            if(timerInterval) clearInterval(timerInterval); 
            isRunning = false; startBtn.innerText = "Bắt Đầu"; currentMode = 'WORK';
            currentTotalTime = WORK_TIME; timeRemaining = WORK_TIME; 
            targetEndTime = null;
            localStorage.setItem('pt_timer_time', timeRemaining); 
            localStorage.setItem('pt_timer_mode', 'WORK');
            localStorage.setItem('pt_total_time', currentTotalTime);
            localStorage.setItem('pt_timer_state', 'STOPPED');
            updateUI();
        }

        function loadFromLocalStorage() {
            if (localStorage.getItem('pt_dark_mode') === 'enabled') {
                document.body.classList.add('dark-mode');
                document.getElementById('darkModeToggle').innerText = '☀️';
            }

            const savedVolume = localStorage.getItem('pt_volume');
            if (savedVolume !== null) {
                currentVolume = parseFloat(savedVolume); volumeSlider.value = currentVolume; alarmSound.volume = currentVolume;
                if (currentVolume === 0) { isMuted = true; document.getElementById('btnMute').innerText = "🔇"; } 
                else { document.getElementById('btnMute').innerText = currentVolume < 0.5 ? "🔉" : "🔊"; }
            }

            const customWork = localStorage.getItem('pt_custom_work');
            if (customWork) { WORK_TIME = parseInt(customWork); workMinInput.value = WORK_TIME / 60; }
            
            const savedWeek = localStorage.getItem('pt_current_week');
            if (savedWeek) document.getElementById('weekSelect').value = savedWeek;
            
            const savedMode = localStorage.getItem('pt_timer_mode');
            if(savedMode) currentMode = savedMode;
            
            const savedTotalTime = localStorage.getItem('pt_total_time');
            if(savedTotalTime) currentTotalTime = parseInt(savedTotalTime);
            else currentTotalTime = WORK_TIME;

            const timerState = localStorage.getItem('pt_timer_state');
            
            if (timerState === 'RUNNING') {
                const savedEndTime = parseInt(localStorage.getItem('pt_end_time'));
                if (savedEndTime) {
                    timeRemaining = Math.ceil((savedEndTime - Date.now()) / 1000);
                    if (timeRemaining <= 0) {
                        timeRemaining = 0;
                        isRunning = false;
                        localStorage.setItem('pt_timer_state', 'STOPPED');
                        updateUI();
                        handleTimerComplete();
                    } else {
                        isRunning = true;
                        startBtn.innerText = "Tạm dừng";
                        targetEndTime = savedEndTime;
                        updateUI();
                        startInterval();
                    }
                }
            } else if (timerState === 'PAUSED') {
                const savedTime = localStorage.getItem('pt_timer_time');
                timeRemaining = savedTime !== null ? parseInt(savedTime) : currentTotalTime;
                isRunning = false;
                startBtn.innerText = "Tiếp tục";
                updateUI();
            } else {
                timeRemaining = WORK_TIME;
                currentMode = 'WORK';
                currentTotalTime = WORK_TIME;
                updateUI();
            }

            updateDailyStreak(); 
        }

        loadFromLocalStorage();
    </script>
</body>
</html>
